name: Create Previews
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Astro site
        run: npm run build
      - name: Install Playwright
        run: |
          npm install -D playwright
          npx playwright install --with-deps chromium
      - name: Start preview server
        run: npm run preview &
        env:
          HOST: 0.0.0.0
          PORT: 4321
      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:4321; do sleep 2; done'
      - name: Create .assets directory
        run: mkdir -p .assets
      - name: Create previews
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            // Create 308x640 preview
            const page1 = await context.newPage();
            await page1.setViewportSize({ width: 308 * 1.5, height: 640 * 1.5 });
            await page1.goto('http://localhost:4321');
            await page1.waitForLoadState('networkidle');
            await page1.screenshot({ path: '.assets/308x640.png', fullPage: false });
            await page1.close();
            // Create 956x640 preview
            const page2 = await context.newPage();
            await page2.setViewportSize({ width: 956 * 1.5, height: 640 * 1.5 });
            await page2.goto('http://localhost:4321');
            await page2.waitForLoadState('networkidle');
            await page2.screenshot({ path: '.assets/956x640.png', fullPage: false });
            await page2.close();
            // Create desktop previews
            const page3 = await context.newPage();
            await page3.setViewportSize({ width: 632 * 1.5, height: 640 * 1.5 });
            await page3.goto('http://localhost:4321');
            await page3.waitForLoadState('networkidle');
            await page3.screenshot({ path: '.assets/desktop1.png', fullPage: false });
            await page3.evaluate(() => window.scrollBy(0, document.body.scrollHeight));
            await page3.waitForTimeout(1000);
            await page3.screenshot({ path: '.assets/desktop2.png', fullPage: false });
            await page3.close();
            // Create mobile previews
            const page4 = await context.newPage();
            await page4.setViewportSize({ width: 308 * 1.5, height: 640 * 1.5 });
            await page4.goto('http://localhost:4321');
            await page4.waitForLoadState('networkidle');
            const scrollToSection = async (index) => {
              await page4.evaluate((sectionIndex) => {
                const section = document.querySelector(`body > section:nth-of-type(${sectionIndex})`);
                if (section) {
                  section.scrollIntoView({ block: 'start', behavior: 'instant' });
                }
              }, index);
              await page4.waitForTimeout(500);
            };
            await scrollToSection(1);
            await page4.screenshot({ path: '.assets/mobile1.png', fullPage: false });
            await scrollToSection(2);
            await page4.screenshot({ path: '.assets/mobile2.png', fullPage: false });
            await scrollToSection(3);
            await page4.screenshot({ path: '.assets/mobile3.png', fullPage: false });
            await scrollToSection(4);
            await page4.screenshot({ path: '.assets/mobile4.png', fullPage: false });
            await page4.close();
            await browser.close();
            console.log('Previews created successfully!');
          })();
          EOF
      - name: Upload previews
        uses: actions/upload-artifact@v4
        with:
          name: previews
          path: |
            .assets/308x640.png
            .assets/956x640.png
            .assets/desktop1.png
            .assets/desktop2.png
            .assets/mobile1.png
            .assets/mobile2.png
            .assets/mobile3.png
            .assets/mobile4.png
          retention-days: 30
      - name: Commit previews (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "olankens@users.noreply.github.com"
          git config --local user.name "olankens"
          git add -f .assets/308x640.png .assets/956x640.png .assets/desktop1.png .assets/desktop2.png .assets/mobile1.png .assets/mobile2.png .assets/mobile3.png .assets/mobile4.png
          git diff --staged --quiet || git commit -m "Update website previews"
          git push
